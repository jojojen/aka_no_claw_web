<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minimal Knowledge and References for OpenClaw Web</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: rgba(255, 252, 245, 0.94);
      --ink: #1f2a2e;
      --muted: #5d6a6f;
      --line: #d7d0c2;
      --accent: #146356;
      --accent-soft: #dcefe8;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      --sans: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(20, 99, 86, 0.10), transparent 32%),
        radial-gradient(circle at top right, rgba(139, 76, 47, 0.08), transparent 28%),
        linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
      font-family: var(--sans);
      line-height: 1.65;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 16px 56px;
    }

    .hero,
    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(31, 42, 46, 0.06);
    }

    .hero {
      position: relative;
      padding: 28px 24px;
      margin-bottom: 16px;
    }

    .hero-actions {
      position: absolute;
      top: 18px;
      right: 18px;
    }

    .lang-toggle {
      appearance: none;
      border: 1px solid rgba(20, 99, 86, 0.22);
      background: rgba(255, 255, 255, 0.86);
      color: var(--accent);
      border-radius: 999px;
      padding: 10px 14px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
      font-weight: 700;
    }

    h1, h2, h3 {
      margin: 0 0 12px;
      line-height: 1.15;
      font-weight: 700;
    }

    h1 { font-size: clamp(30px, 6vw, 48px); }
    h2 { font-size: 28px; }
    h3 { font-size: 20px; margin-top: 22px; }
    p { margin: 0 0 14px; }
    ul { margin: 0 0 14px 22px; padding: 0; }
    li { margin: 0 0 8px; }

    .summary {
      color: var(--muted);
      max-width: 64ch;
      font-size: 18px;
    }

    .section {
      padding: 22px 22px 18px;
      margin-top: 16px;
    }

    code, pre {
      font-family: var(--mono);
      font-size: 0.95em;
    }

    pre {
      margin: 14px 0;
      padding: 14px 16px;
      overflow-x: auto;
      white-space: pre-wrap;
      border-radius: 12px;
      background: #1f2a2e;
      color: #f3f6f7;
    }

    .link-list a {
      word-break: break-word;
    }

    a { color: var(--accent); }

    @media (max-width: 640px) {
      .wrap { padding: 18px 12px 44px; }
      .hero { padding: 22px 18px; }
      .section { padding: 18px 16px 14px; }
      h2 { font-size: 24px; }
      .hero-actions {
        top: 14px;
        right: 14px;
      }
      .lang-toggle {
        padding: 8px 12px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="hero-actions">
        <button id="lang-toggle" class="lang-toggle" type="button" aria-label="Switch to Traditional Chinese">繁中</button>
      </div>
      <p id="hero-eyebrow" class="eyebrow">OpenClaw Web</p>
      <h1 id="hero-title">Minimal Knowledge and References</h1>
      <p id="hero-summary" class="summary">
        This page only contains the minimum knowledge worth understanding,
        followed by core references and optional extended reading.
      </p>
    </section>

    <section id="section-minimal" class="section"></section>
    <section id="section-references" class="section"></section>
    <section id="section-extended" class="section"></section>
    <section id="section-ignore" class="section"></section>
  </main>
  <script>
    const translations = {
      en: {
        lang: "en",
        title: "Minimal Knowledge and References for OpenClaw Web",
        toggleText: "繁中",
        toggleLabel: "Switch to Traditional Chinese",
        heroEyebrow: "OpenClaw Web",
        heroTitle: "Minimal Knowledge and References",
        heroSummary: "This page only contains the minimum knowledge worth understanding, followed by core references and optional extended reading.",
        sections: {
          minimal: `
            <h2>Minimal Knowledge</h2>
            <h3>1. State transitions</h3>
            <p>Think of chat as moving through states:</p>
            <pre>idle -> running -> streaming -> done / error / cancelled</pre>
            <p>Why this matters:</p>
            <ul>
              <li>it helps spot incomplete specs</li>
              <li>it makes freeze-like failures easier to identify</li>
              <li>it forces cancel and error states to exist explicitly</li>
            </ul>
            <h3>2. Long work must not block the whole experience</h3>
            <p>You only need to understand:</p>
            <pre>long model output cannot wait until one final response blob</pre>
            <p>Why this matters:</p>
            <ul>
              <li>it explains why streaming or job/polling is required</li>
              <li>it explains why a page can feel stuck</li>
            </ul>
            <h3>3. Timeout, retry, cancel</h3>
            <p>You only need these basic truths:</p>
            <ul>
              <li>timeout does not always mean the work stopped</li>
              <li>retry can create duplicate work</li>
              <li>cancel may not stop the underlying worker immediately</li>
            </ul>
            <p>Why this matters:</p>
            <ul>
              <li>it affects trust in the product</li>
              <li>it affects whether retry is safe</li>
              <li>it affects cleanup expectations</li>
            </ul>
            <h3>4. One feature, multiple backends</h3>
            <p>Treat model choice as:</p>
            <pre>one chat feature
multiple backends</pre>
            <p>Why this matters:</p>
            <ul>
              <li><code>local</code> and <code>cloud_pickle</code> should feel like one feature</li>
              <li>backend changes should not force frontend redesign</li>
            </ul>
            <h3>5. Complexity increases quickly</h3>
            <p>You only need one management intuition:</p>
            <pre>every extra concern increases uncertainty and debugging cost</pre>
            <p>Why this matters:</p>
            <ul>
              <li>it helps judge system risk</li>
              <li>it helps explain why reliability drops when too many concerns are mixed together</li>
            </ul>
          `,
          references: `
            <h2>Reference Materials</h2>
            <div class="link-list">
              <h3>Browser streaming</h3>
              <ul>
                <li><a href="https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events" target="_blank" rel="noreferrer">MDN: Using server-sent events</a></li>
                <li><a href="https://developer.mozilla.org/en-US/docs/Web/API/Streams_API/Using_readable_streams" target="_blank" rel="noreferrer">MDN: Using readable streams</a></li>
              </ul>
              <h3>Python backend streaming</h3>
              <ul>
                <li><a href="https://fastapi.tiangolo.com/advanced/custom-response/#streamingresponse" target="_blank" rel="noreferrer">FastAPI: StreamingResponse</a></li>
              </ul>
              <h3>Local model API shape</h3>
              <ul>
                <li><a href="https://docs.ollama.com/api/introduction" target="_blank" rel="noreferrer">Ollama API introduction</a></li>
              </ul>
              <h3>Frontend responsiveness</h3>
              <ul>
                <li><a href="https://react.dev/reference/react/useTransition" target="_blank" rel="noreferrer">React: useTransition</a></li>
              </ul>
            </div>
          `,
          extended: `
            <h2>Extended Reading</h2>
            <div class="link-list">
              <h3>React</h3>
              <ul>
                <li><a href="https://react.dev/reference/react-dom/server/renderToPipeableStream" target="_blank" rel="noreferrer">React server streaming reference</a></li>
              </ul>
              <h3>Browser APIs</h3>
              <ul>
                <li><a href="https://developer.mozilla.org/en-US/docs/Web/API/EventSource" target="_blank" rel="noreferrer">MDN: EventSource reference</a></li>
                <li><a href="https://developer.mozilla.org/en-US/docs/Web/API/AbortController" target="_blank" rel="noreferrer">MDN: AbortController reference</a></li>
              </ul>
              <h3>Architecture / observability</h3>
              <ul>
                <li><a href="https://opentelemetry.io/docs/" target="_blank" rel="noreferrer">OpenTelemetry documentation</a></li>
              </ul>
            </div>
          `,
          ignore: `
            <h2>What You Can Ignore</h2>
            <p>For now, you can ignore:</p>
            <ul>
              <li>React component structure</li>
              <li>exact endpoint code</li>
              <li>async generator implementation details</li>
              <li>stream parser implementation</li>
              <li>SSE formatting details</li>
              <li>Python cancellation internals</li>
            </ul>
            <p>Those are implementation concerns for the agent.</p>
          `
        }
      },
      zh: {
        lang: "zh-Hant",
        title: "OpenClaw Web 最小知識與參考資料",
        toggleText: "EN",
        toggleLabel: "Switch to English",
        heroEyebrow: "OpenClaw Web",
        heroTitle: "最小知識與參考資料",
        heroSummary: "這一頁只保留最小需要理解的知識，接著是核心參考資料與可選的延伸閱讀。",
        sections: {
          minimal: `
            <h2>最小需要理解的知識</h2>
            <h3>1. 狀態轉移</h3>
            <p>把聊天系統想成在不同狀態間移動：</p>
            <pre>idle -> running -> streaming -> done / error / cancelled</pre>
            <p>為什麼重要：</p>
            <ul>
              <li>可以幫你看出規格是否不完整</li>
              <li>比較容易辨認「看起來像當機」的失敗模式</li>
              <li>會迫使 cancel 與 error 狀態被明確定義</li>
            </ul>
            <h3>2. 長工作不能阻塞整個體驗</h3>
            <p>你只需要理解：</p>
            <pre>長模型輸出不能等到最後一包回應才一次顯示</pre>
            <p>為什麼重要：</p>
            <ul>
              <li>這說明了為什麼需要 streaming 或 job/polling</li>
              <li>這說明了為什麼頁面會看起來像卡住</li>
            </ul>
            <h3>3. timeout、retry、cancel</h3>
            <p>你只需要記住這些基本事實：</p>
            <ul>
              <li>timeout 不一定代表工作真的停了</li>
              <li>retry 可能產生重複工作</li>
              <li>cancel 不一定能立刻停掉底層 worker</li>
            </ul>
            <p>為什麼重要：</p>
            <ul>
              <li>它會影響產品信任感</li>
              <li>它會影響 retry 是否安全</li>
              <li>它會影響 cleanup 的期待</li>
            </ul>
            <h3>4. 一個功能，多個後端</h3>
            <p>把模型選擇視為：</p>
            <pre>一個聊天功能
多個後端</pre>
            <p>為什麼重要：</p>
            <ul>
              <li><code>local</code> 和 <code>cloud_pickle</code> 應該讓人感覺是同一個功能</li>
              <li>後端替換不應強迫前端重做設計</li>
            </ul>
            <h3>5. 複雜度會很快上升</h3>
            <p>你只需要一個管理直覺：</p>
            <pre>每多加一個關切點，不確定性與除錯成本都會上升</pre>
            <p>為什麼重要：</p>
            <ul>
              <li>它有助於判斷系統風險</li>
              <li>它有助於理解為什麼太多問題混在一起時穩定性會下降</li>
            </ul>
          `,
          references: `
            <h2>核心參考資料</h2>
            <div class="link-list">
              <h3>瀏覽器串流</h3>
              <ul>
                <li><a href="https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events" target="_blank" rel="noreferrer">MDN: Using server-sent events</a></li>
                <li><a href="https://developer.mozilla.org/en-US/docs/Web/API/Streams_API/Using_readable_streams" target="_blank" rel="noreferrer">MDN: Using readable streams</a></li>
              </ul>
              <h3>Python 後端串流</h3>
              <ul>
                <li><a href="https://fastapi.tiangolo.com/advanced/custom-response/#streamingresponse" target="_blank" rel="noreferrer">FastAPI: StreamingResponse</a></li>
              </ul>
              <h3>地端模型 API 形狀</h3>
              <ul>
                <li><a href="https://docs.ollama.com/api/introduction" target="_blank" rel="noreferrer">Ollama API introduction</a></li>
              </ul>
              <h3>前端回應性</h3>
              <ul>
                <li><a href="https://react.dev/reference/react/useTransition" target="_blank" rel="noreferrer">React: useTransition</a></li>
              </ul>
            </div>
          `,
          extended: `
            <h2>延伸資料</h2>
            <div class="link-list">
              <h3>React</h3>
              <ul>
                <li><a href="https://react.dev/reference/react-dom/server/renderToPipeableStream" target="_blank" rel="noreferrer">React server streaming reference</a></li>
              </ul>
              <h3>瀏覽器 API</h3>
              <ul>
                <li><a href="https://developer.mozilla.org/en-US/docs/Web/API/EventSource" target="_blank" rel="noreferrer">MDN: EventSource reference</a></li>
                <li><a href="https://developer.mozilla.org/en-US/docs/Web/API/AbortController" target="_blank" rel="noreferrer">MDN: AbortController reference</a></li>
              </ul>
              <h3>架構 / 可觀測性</h3>
              <ul>
                <li><a href="https://opentelemetry.io/docs/" target="_blank" rel="noreferrer">OpenTelemetry documentation</a></li>
              </ul>
            </div>
          `,
          ignore: `
            <h2>你可以先忽略的東西</h2>
            <p>目前可以忽略：</p>
            <ul>
              <li>React component 結構</li>
              <li>endpoint 細節程式</li>
              <li>async generator 的實作細節</li>
              <li>stream parser 的程式</li>
              <li>SSE 格式細節</li>
              <li>Python cancellation internals</li>
            </ul>
            <p>那些是 agent 的實作問題。</p>
          `
        }
      }
    };

    function applyLanguage(language) {
      const data = translations[language] || translations.en;
      document.documentElement.lang = data.lang;
      document.title = data.title;
      document.getElementById("hero-eyebrow").textContent = data.heroEyebrow;
      document.getElementById("hero-title").textContent = data.heroTitle;
      document.getElementById("hero-summary").textContent = data.heroSummary;
      document.getElementById("section-minimal").innerHTML = data.sections.minimal;
      document.getElementById("section-references").innerHTML = data.sections.references;
      document.getElementById("section-extended").innerHTML = data.sections.extended;
      document.getElementById("section-ignore").innerHTML = data.sections.ignore;
      const button = document.getElementById("lang-toggle");
      button.textContent = data.toggleText;
      button.setAttribute("aria-label", data.toggleLabel);
      button.dataset.lang = language;
      localStorage.setItem("openclaw_web_learning_lang", language);
    }

    const savedLanguage = localStorage.getItem("openclaw_web_learning_lang");
    applyLanguage(savedLanguage === "zh" ? "zh" : "en");

    document.getElementById("lang-toggle").addEventListener("click", () => {
      const current = document.getElementById("lang-toggle").dataset.lang === "zh" ? "zh" : "en";
      applyLanguage(current === "en" ? "zh" : "en");
    });
  </script>
</body>
</html>
